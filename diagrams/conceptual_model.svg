<svg aria-roledescription="flowchart-v2" role="graphics-document document" viewBox="-8 -8 3550.234375 185.25" style="max-width: 3550.23px; background-color: transparent;" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" width="100%" id="my-svg"><style>#my-svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}#my-svg .error-icon{fill:#552222;}#my-svg .error-text{fill:#552222;stroke:#552222;}#my-svg .edge-thickness-normal{stroke-width:2px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#333333;stroke:#333333;}#my-svg .marker.cross{stroke:#333333;}#my-svg svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#my-svg .label{font-family:"trebuchet ms",verdana,arial,sans-serif;color:#333;}#my-svg .cluster-label text{fill:#333;}#my-svg .cluster-label span,#my-svg p{color:#333;}#my-svg .label text,#my-svg span,#my-svg p{fill:#333;color:#333;}#my-svg .node rect,#my-svg .node circle,#my-svg .node ellipse,#my-svg .node polygon,#my-svg .node path{fill:#ECECFF;stroke:#9370DB;stroke-width:1px;}#my-svg .flowchart-label text{text-anchor:middle;}#my-svg .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#my-svg .node .label{text-align:center;}#my-svg .node.clickable{cursor:pointer;}#my-svg .arrowheadPath{fill:#333333;}#my-svg .edgePath .path{stroke:#333333;stroke-width:2.0px;}#my-svg .flowchart-link{stroke:#333333;fill:none;}#my-svg .edgeLabel{background-color:#e8e8e8;text-align:center;}#my-svg .edgeLabel rect{opacity:0.5;background-color:#e8e8e8;fill:#e8e8e8;}#my-svg .labelBkg{background-color:rgba(232, 232, 232, 0.5);}#my-svg .cluster rect{fill:#ffffde;stroke:#aaaa33;stroke-width:1px;}#my-svg .cluster text{fill:#333;}#my-svg .cluster span,#my-svg p{color:#333;}#my-svg div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:12px;background:hsl(80, 100%, 96.2745098039%);border:1px solid #aaaa33;border-radius:2px;pointer-events:none;z-index:100;}#my-svg .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#333;}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g><marker orient="auto" markerHeight="12" markerWidth="12" markerUnits="userSpaceOnUse" refY="5" refX="6" viewBox="0 0 10 10" class="marker flowchart" id="my-svg_flowchart-pointEnd"><path style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker orient="auto" markerHeight="12" markerWidth="12" markerUnits="userSpaceOnUse" refY="5" refX="4.5" viewBox="0 0 10 10" class="marker flowchart" id="my-svg_flowchart-pointStart"><path style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" d="M 0 5 L 10 10 L 10 0 z"/></marker><marker orient="auto" markerHeight="11" markerWidth="11" markerUnits="userSpaceOnUse" refY="5" refX="11" viewBox="0 0 10 10" class="marker flowchart" id="my-svg_flowchart-circleEnd"><circle style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" r="5" cy="5" cx="5"/></marker><marker orient="auto" markerHeight="11" markerWidth="11" markerUnits="userSpaceOnUse" refY="5" refX="-1" viewBox="0 0 10 10" class="marker flowchart" id="my-svg_flowchart-circleStart"><circle style="stroke-width: 1; stroke-dasharray: 1, 0;" class="arrowMarkerPath" r="5" cy="5" cx="5"/></marker><marker orient="auto" markerHeight="11" markerWidth="11" markerUnits="userSpaceOnUse" refY="5.2" refX="12" viewBox="0 0 11 11" class="marker cross flowchart" id="my-svg_flowchart-crossEnd"><path style="stroke-width: 2; stroke-dasharray: 1, 0;" class="arrowMarkerPath" d="M 1,1 l 9,9 M 10,1 l -9,9"/></marker><marker orient="auto" markerHeight="11" markerWidth="11" markerUnits="userSpaceOnUse" refY="5.2" refX="-1" viewBox="0 0 11 11" class="marker cross flowchart" id="my-svg_flowchart-crossStart"><path style="stroke-width: 2; stroke-dasharray: 1, 0;" class="arrowMarkerPath" d="M 1,1 l 9,9 M 10,1 l -9,9"/></marker><g class="root"><g class="clusters"/><g class="edgePaths"><path marker-end="url(#my-svg_flowchart-pointEnd)" style="fill:none;" class="edge-thickness-normal edge-pattern-solid flowchart-link LS-P LE-G" id="L-P-G-0" d="M1047.781,91.97L1061.241,91.642C1074.701,91.313,1101.62,90.657,1127.656,90.781C1153.693,90.905,1178.847,91.81,1191.423,92.263L1204,92.715"/><path marker-end="url(#my-svg_flowchart-pointEnd)" style="fill:none;" class="edge-thickness-normal edge-pattern-solid flowchart-link LS-G LE-B" id="L-G-B-0" d="M1867.563,58.512L1871.729,57.927C1875.896,57.341,1884.229,56.171,1891.679,55.585C1899.129,55,1905.696,55,1908.979,55L1912.263,55"/><path marker-end="url(#my-svg_flowchart-pointEnd)" style="fill:none;" class="edge-thickness-normal edge-pattern-solid flowchart-link LS-B LE-S" id="L-B-S-0" d="M2629.578,42.302L2639.165,41.96C2648.753,41.618,2667.927,40.934,2686.224,41.55C2704.52,42.166,2721.938,44.082,2730.648,45.039L2739.357,45.997"/><path marker-end="url(#my-svg_flowchart-pointEnd)" style="fill:none;" class="edge-thickness-normal edge-pattern-solid flowchart-link LS-S LE-B" id="L-S-B-0" d="M2744.625,90L2735.038,90C2725.451,90,2706.276,90,2687.982,89.263C2669.687,88.526,2652.273,87.052,2643.566,86.315L2634.859,85.578"/><path marker-end="url(#my-svg_flowchart-pointEnd)" style="fill:none;" class="edge-thickness-normal edge-pattern-solid flowchart-link LS-S LE-G" id="L-S-G-0" d="M2744.625,146.297L2735.038,147.665C2725.451,149.032,2706.276,151.766,2627.767,153.133C2549.258,154.5,2411.414,154.5,2278.991,154.5C2146.568,154.5,2019.565,154.5,1952.772,154.038C1885.979,153.575,1879.395,152.65,1876.103,152.188L1872.811,151.725"/><path marker-end="url(#my-svg_flowchart-pointEnd)" style="fill:none;" class="edge-thickness-normal edge-pattern-solid flowchart-link LS-G LE-P" id="L-G-P-0" d="M1209.297,116.594L1195.837,117.078C1182.378,117.563,1155.458,118.531,1129.422,118.709C1103.386,118.886,1078.233,118.273,1065.656,117.966L1053.08,117.659"/></g><g class="edgeLabels"><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g><g transform="translate(2687.1015625, 90)" class="edgeLabel"><g transform="translate(-32.5234375, -9.5)" class="label"><foreignObject height="19" width="65.046875"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel">Mitigate</span></div></foreignObject></g></g><g transform="translate(2273.5703125, 154.5)" class="edgeLabel"><g transform="translate(-25.15625, -9.5)" class="label"><foreignObject height="19" width="50.3125"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel">Refine</span></div></foreignObject></g></g><g transform="translate(1128.5390625, 119.5)" class="edgeLabel"><g transform="translate(-55.7578125, -9.5)" class="label"><foreignObject height="19" width="111.515625"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel">Reassess KPIs</span></div></foreignObject></g></g></g><g class="nodes"><g transform="translate(523.890625, 104.75)" data-id="P" data-node="true" id="flowchart-P-0" class="node default default flowchart-label"><rect height="110" width="1047.78125" y="-55" x="-523.890625" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-516.390625, -47.5)" style="" class="label"><rect/><foreignObject height="95" width="1032.78125"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">Problem (UK Digital Divide)<br />• First-level: limited broadband &amp; devices; rural NI/Scotland; low-income households lack laptops/tablets<br />• Second-level: low digital literacy (~11M adults), 65+, disabilities<br />• Third-level: low outcomes/confidence across education, jobs, health; compounding factors (age, income, geography, disability)<br />• Impact KPIs: coverage %, device ownership, Essential Digital Skills, service uptake</span></div></foreignObject></g></g><g transform="translate(1538.4296875, 104.75)" data-id="G" data-node="true" id="flowchart-G-1" class="node default default flowchart-label"><rect height="129" width="658.265625" y="-64.5" x="-329.1328125" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-321.6328125, -57)" style="" class="label"><rect/><foreignObject height="114" width="643.265625"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">Gen AI Solution<br />• Digital literacy tutors: step-by-step help (forms, passwords, safety)<br />• Localised content: dialects, reading levels, multilingual support<br />• Accessible UX: voice-first, large text, screen-reader-friendly, simplified flows<br />• Mobile-first, low-bandwidth; offline/on-device options where feasible<br />• Human-in-the-loop via mentors; integrate with libraries, councils, NHS/GOV.UK</span></div></foreignObject></g></g><g transform="translate(2273.5703125, 55)" data-id="B" data-node="true" id="flowchart-B-2" class="node default default flowchart-label"><rect height="110" width="712.015625" y="-55" x="-356.0078125" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-348.5078125, -47.5)" style="" class="label"><rect/><foreignObject height="95" width="697.015625"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">Barriers<br />• Technological: connectivity, old/shared devices, latency, interoperability<br />• Ethical: bias/representativeness, opacity, privacy &amp; GDPR<br />• Social: trust, motivation, stigma; language/cultural mismatch<br />• Organisational/policy: skills gaps, siloed funding, procurement/regulatory uncertainty</span></div></foreignObject></g></g><g transform="translate(3139.4296875, 90)" data-id="S" data-node="true" id="flowchart-S-3" class="node default default flowchart-label"><rect height="148" width="789.609375" y="-74" x="-394.8046875" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-387.3046875, -66.5)" style="" class="label"><rect/><foreignObject height="133" width="774.609375"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">Strategies<br />• Access: device/databank, public Wi‑Fi hubs, mobile-first, offline caches<br />• Ethical design: representative data, community co-design, explainability, governance<br />• Trust: hybrid human+AI delivery, mentors, guardrails &amp; safety controls<br />• Localisation &amp; accessibility: multilingual, dialect-aware, universal design<br />• Capacity &amp; policy: staff upskilling, toolkits, procurement standards, align to UK Digital Strategy<br />• Monitoring: evals, A/B tests, inclusion KPIs, cost/latency controls</span></div></foreignObject></g></g></g></g></g></svg>